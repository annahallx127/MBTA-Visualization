<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MBTA Pulse</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0a0a0f; font-family:'Courier New',monospace; color:#e0e0e0; overflow:hidden; height:100vh; }
#map { width:100%; height:100vh; }
.leaflet-tile { filter: brightness(0.25) saturate(0.3) hue-rotate(200deg); }
.leaflet-container { background:#0a0a0f; }

#header {
  position:absolute; top:0; left:0; right:0; z-index:1000;
  background:linear-gradient(180deg,rgba(10,10,15,0.95) 0%,transparent 100%);
  padding:14px 20px 40px; pointer-events:none;
}
#header h1 { font-size:1.1rem; letter-spacing:.25em; color:#fff; text-transform:uppercase; }
#header p  { font-size:.65rem; color:#666; letter-spacing:.1em; margin-top:3px; }

#stats {
  position:absolute; top:62px; right:20px; z-index:1000;
  background:rgba(10,10,15,.9); border:1px solid #2a2a2a;
  border-radius:8px; padding:12px 16px; font-size:.62rem;
  letter-spacing:.08em; backdrop-filter:blur(6px); min-width:160px;
}
#stats h3 { font-size:.65rem; color:#666; margin-bottom:8px; letter-spacing:.2em; }
.stat-row { display:flex; justify-content:space-between; margin:5px 0; gap:16px; }
.sv { font-weight:bold; }
.sv.r { color:#ff4757; } .sv.y { color:#ffd93d; } .sv.g { color:#39ff7a; } .sv.w { color:#fff; }

#controls {
  position:absolute; top:62px; left:20px; z-index:1000;
  display:flex; flex-direction:column; gap:8px;
}
.ctrl-btn {
  background:rgba(10,10,15,.9); border:1px solid #2a2a2a;
  border-radius:8px; padding:8px 14px; font-size:.6rem;
  letter-spacing:.1em; cursor:pointer; color:#888;
  font-family:inherit; backdrop-filter:blur(6px);
  transition:border-color .2s,color .2s; pointer-events:all;
}
.ctrl-btn:hover { border-color:#39ff7a; color:#39ff7a; }
.ctrl-btn.loading { border-color:#ffd93d; color:#ffd93d; }
#data-src { font-size:.55rem; color:#444; margin-top:2px; }

#legend {
  position:absolute; bottom:20px; left:20px; z-index:1000;
  background:rgba(10,10,15,.9); border:1px solid #2a2a2a;
  border-radius:8px; padding:14px 18px; font-size:.62rem;
  letter-spacing:.08em; backdrop-filter:blur(6px);
}
#legend h3 { font-size:.65rem; color:#666; margin-bottom:10px; letter-spacing:.2em; }
.leg-row { display:flex; align-items:center; gap:10px; margin:5px 0; }
.dot { width:11px; height:11px; border-radius:50%; flex-shrink:0; }
.dot.g { background:#39ff7a; box-shadow:0 0 6px #39ff7a88; }
.dot.y { background:#ffd93d; box-shadow:0 0 6px #ffd93d88; }
.dot.r { background:#ff4757; box-shadow:0 0 6px #ff475788; }
hr.div { border:none; border-top:1px solid #222; margin:10px 0; }
.sz-row { display:flex; align-items:center; gap:8px; margin:5px 0; }
.s1{width:8px;height:8px;border-radius:50%;background:#555;}
.s2{width:14px;height:14px;border-radius:50%;background:#555;}
.s3{width:20px;height:20px;border-radius:50%;background:#555;}
#line-filter { display:flex; gap:5px; flex-wrap:wrap; margin-top:8px; }
.lb {
  padding:3px 9px; border-radius:4px; font-size:.58rem; cursor:pointer;
  border:1px solid transparent; font-family:inherit; letter-spacing:.05em;
  transition:opacity .2s;
}
.lb.on { opacity:1; } .lb.off { opacity:.25; }
.rl { background:#da291c22; border-color:#da291c; color:#ff7070; }
.ol { background:#ed8b0022; border-color:#ed8b00; color:#ffb347; }
.gl { background:#00843d22; border-color:#00843d; color:#4dff91; }
.bl { background:#003da522; border-color:#003da5; color:#6699ff; }
.sl { background:#7c878e22; border-color:#7c878e; color:#b0b8c0; }

#ts { position:absolute; bottom:20px; right:20px; z-index:1000; font-size:.56rem; color:#333; letter-spacing:.06em; }

/* popup */
.leaflet-popup-content-wrapper {
  background:rgba(8,8,12,.96)!important; border:1px solid #2a2a2a!important;
  border-radius:8px!important; box-shadow:0 4px 30px rgba(0,0,0,.9)!important;
  color:#e0e0e0!important; font-family:'Courier New',monospace!important;
}
.leaflet-popup-tip { background:rgba(8,8,12,.96)!important; }
.leaflet-popup-content { margin:14px 18px!important; font-size:.75rem; line-height:1.8; }
.pn { font-size:.9rem; font-weight:bold; color:#fff; margin-bottom:4px; }
.pl { font-size:.6rem; letter-spacing:.12em; margin-bottom:10px; }
.ps { display:flex; justify-content:space-between; gap:20px; }
.pv { font-weight:bold; }
.psc { font-size:1.5rem; font-weight:bold; text-align:center; margin:10px 0 2px; }
.psl { font-size:.58rem; color:#666; text-align:center; letter-spacing:.12em; }
</style>
</head>

<div id="header">
  <h1>MBTA PULSE</h1>
  <p>live transit generative art · boston, ma</p>
</div>
<div id="map"></div>

<div id="controls">
  <button class="ctrl-btn" id="refresh-btn" onclick="loadData()">↻ REFRESH</button>
  <div id="data-src">source: —</div>
</div>

<div id="stats">

  <div class="stat-row"><span>Stops</span><span class="sv w" id="s-total">—</span></div>

  <div class="stat-row"><span>On time</span><span class="sv g"  id="s-green">—</span></div>
</div>

<div id="legend">
  <h3>TRANSLATION RULES</h3>
  <div class="leg-row"><div class="dot g"></div><span>on time · no disruption</span></div>
  <div class="leg-row"><div class="dot y"></div><span>minor delay</span></div>
  <div class="leg-row"><div class="dot r"></div><span>active alert · disruption</span></div>
  <hr class="div">
  <div class="sz-row"><div class="s1"></div><div class="s2"></div><div class="s3"></div><span style="margin-left:4px">busyness 0 → 6+</span></div>
  <hr class="div">
  <h3 style="margin-bottom:6px">FILTER BY LINE</h3>
  <div id="line-filter">
    <button class="lb rl on" data-line="Red"    onclick="toggleLine(this)">RED</button>
    <button class="lb ol on" data-line="Orange" onclick="toggleLine(this)">ORANGE</button>

  </div>
</div>

const LINE_COLOR = {Red:'#da291c',Orange:'#ed8b00',Green:'#00843d',Blue:'#003da5',Silver:'#7c878e'};
const KEY = 'ca5dc23d93fe4d04898b7b456e02ef05';
const activeLines = new Set(['Red','Orange','Green','Blue','Silver']);
let map, markers = {}, stopMeta = {};

// ── Init map ──────────────────────────────────────────────
function initMap() {
  map = L.map('map',{zoomControl:false,attributionControl:false}).setView([42.358,-71.06],13);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,opacity:1}).addTo(map);
  L.control.zoom({position:'bottomright'}).addTo(map);
}

// ── Busyness formula ──────────────────────────────────────
function calcScore(approaching, maxDelay, alertCount) {
  let s = 0;
  s += Math.min(approaching, 3);
  if (maxDelay > 3) s += 1;
  if (maxDelay > 8) s += 1;
  if (alertCount > 0) s += 3;
  return s;
}
const radius = s => s <= 2 ? 7 : s <= 5 ? 13 : 20;
const color  = (s, alerts, delay) =>
  (alerts > 0 || delay > 8) ? '#ff4757' :
  (delay > 2 || s >= 3)     ? '#ffd93d' : '#39ff7a';

// ── Draw one stop ─────────────────────────────────────────
function drawStop(stopId, line, name, lat, lng, approaching, maxDelay, alertCount) {
  const sc = calcScore(approaching, maxDelay, alertCount);
  const r  = radius(sc);
  const c  = color(sc, alertCount, maxDelay);
  const lc = LINE_COLOR[line];
  const pulse = sc >= 3;

  if (markers[stopId]) { map.removeLayer(markers[stopId]); delete markers[stopId]; }

  const sz = r * 2 + 28;
  const cx = sz / 2;

  const icon = L.divIcon({
    className: '',
    html: `<div style="position:relative;width:${sz}px;height:${sz}px;">
      <svg width="${sz}" height="${sz}" style="overflow:visible;position:absolute;top:0;left:0">
        ${pulse ? `
        <circle cx="${cx}" cy="${cx}" r="${r}" fill="${c}" fill-opacity="0.25" stroke="none">
          <animate attributeName="r" values="${r};${r+10};${r}" dur="${1.5 + Math.random()*1}s" repeatCount="indefinite"/>
          <animate attributeName="fill-opacity" values="0.25;0;0.25" dur="${1.5 + Math.random()*1}s" repeatCount="indefinite"/>
        </circle>` : ''}
        <circle cx="${cx}" cy="${cx}" r="${r}" fill="${c}" fill-opacity="0.85" stroke="${lc}" stroke-width="1.5"/>
      </svg>
    </div>`,
    iconSize: [sz, sz],
    iconAnchor: [cx, cx]
  });

  const statusTxt = alertCount > 0 ? '🔴 DISRUPTED' : maxDelay > 2 ? '🟡 DELAYED' : '🟢 ON TIME';
  const lbl = sc <= 2 ? 'QUIET' : sc <= 5 ? 'BUSY' : 'HECTIC';
  const popup = `
    <div class="pn">${name}</div>
    <div class="pl" style="color:${lc}">${line.toUpperCase()} LINE</div>
    <div class="psc" style="color:${c}">${sc}</div>
    <div class="psl">BUSYNESS SCORE · ${lbl}</div>
    <hr style="border-color:#222;margin:8px 0">
    <div class="ps"><span>Status</span><span class="pv">${statusTxt}</span></div>
    <div class="ps"><span>Vehicles (10 min)</span><span class="pv">${approaching}</span></div>
    <div class="ps"><span>Max delay</span><span class="pv">${maxDelay} min</span></div>
    <div class="ps"><span>Active alerts</span><span class="pv">${alertCount}</span></div>`;

  const m = L.marker([lat, lng], {icon}).bindPopup(popup, {maxWidth:240});
  if (activeLines.has(line)) m.addTo(map);
  markers[stopId] = m;
  stopMeta[stopId] = {line, color: c, marker: m};
}

// ── Simulated-realistic data (always visible fallback) ────
function simulateData() {
  // Weighted random based on time of day
  const h = new Date().getHours();
  const rushHour = (h >= 7 && h <= 9) || (h >= 16 && h <= 18);
  const late = h >= 22 || h < 5;

  // Known busy stops get higher scores
  const hotspots = new Set([
    'place-pktrm','place-dwnxg','place-sstat','place-north',
    'place-haecl','place-kencl','place-harsq','place-knncl',
    'place-bbsta','place-rugg','place-state','place-gover'
  ]);

  let allStops = [];
  for (const [line, stops] of Object.entries(STOP_DATA)) {
    for (const s of stops) {
      const hot = hotspots.has(s.id);
      let approaching = late ? 0 : Math.floor(Math.random() * (rushHour ? 4 : 2));
      if (hot && rushHour) approaching += 2;
      let maxDelay = Math.random() < (rushHour ? 0.4 : 0.15) ? Math.floor(Math.random()*15+1) : 0;
      let alertCount = Math.random() < 0.08 ? 1 : 0;
      allStops.push({...s, line, approaching, maxDelay, alertCount});
    }
  }
  return allStops;
}

// ── Live MBTA API fetch ───────────────────────────────────
async function fetchLive() {
  const allStops = [];
  const seen = new Set();

  // Build flat stop list
  for (const [line, stops] of Object.entries(STOP_DATA)) {
    for (const s of stops) {
      if (!seen.has(s.id)) { seen.add(s.id); allStops.push({...s, line}); }
    }
  }

  // Fetch alerts
  let alertsByStop = {};
  let totalAlerts = 0;
  try {
    const ar = await fetch(`https://api-v3.mbta.com/alerts?filter[route_type]=0,1,3&fields[alert]=informed_entity`,
      {headers:{'x-api-key':KEY}});
    if (ar.ok) {
      const aj = await ar.json();
      totalAlerts = aj.data.length;
      for (const a of aj.data) {
        for (const e of (a.attributes?.informed_entity||[])) {
          if (e.stop) alertsByStop[e.stop] = (alertsByStop[e.stop]||0) + 1;
        }
      }
    }
  } catch(e) {}

  // Fetch predictions per stop (batched)
  const enriched = [];
  for (let i = 0; i < allStops.length; i += 6) {
    const batch = allStops.slice(i, i+6);
    await Promise.all(batch.map(async s => {
      let approaching = 0, maxDelay = 0;
      try {
        const ids = s.id;
        const pr = await fetch(
          `https://api-v3.mbta.com/predictions?filter[stop]=${ids}&page[limit]=10&fields[prediction]=departure_time,arrival_time`,
          {headers:{'x-api-key':KEY}});
        if (pr.ok) {
          const pj = await pr.json();
          const now = Date.now();
          for (const p of pj.data) {
            const dep = p.attributes?.departure_time || p.attributes?.arrival_time;
            if (dep) {
              const diff = (new Date(dep) - now) / 60000;
              if (diff >= 0 && diff <= 10) approaching++;
            }
          }
        }
      } catch(e) {}
      enriched.push({...s, approaching, maxDelay, alertCount: alertsByStop[s.id]||0});
    }));
  }
  return {stops: enriched, totalAlerts};
}

// ── Main load ─────────────────────────────────────────────
async function loadData() {
  const btn = document.getElementById('refresh-btn');
  btn.classList.add('loading');
  btn.textContent = '↻ LOADING…';

  // Always render simulated first so map is never blank
  const simStops = simulateData();
  renderStops(simStops, simStops.length, simStops.filter(s=>s.alertCount>0).length, 'simulated (realistic)');

  // Then try live on top
  try {
    const {stops, totalAlerts} = await fetchLive();
    if (stops && stops.length > 0) {
      renderStops(stops, stops.length, totalAlerts, 'live mbta api');
    }
  } catch(e) {
    console.warn('Live fetch failed, keeping simulation', e);
  }

  document.getElementById('ts').textContent =
    'last updated: ' + new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit'});

  btn.classList.remove('loading');
  btn.textContent = '↻ REFRESH';
}

function renderStops(stops, total, alerts, src) {
  stopMeta = {};
  let red=0, yellow=0, green=0;

  // Deduplicate by id, keeping last occurrence
  const byId = {};
  for (const s of stops) byId[s.id] = s;

  for (const s of Object.values(byId)) {
    drawStop(s.id, s.line, s.name, s.lat, s.lng, s.approaching||0, s.maxDelay||0, s.alertCount||0);
    const c = stopMeta[s.id]?.color;
    if (c === '#ff4757') red++;
    else if (c === '#ffd93d') yellow++;
    else green++;
  }

  document.getElementById('s-total').textContent  = Object.keys(byId).length;
  document.getElementById('s-alerts').textContent = alerts;
  document.getElementById('s-red').textContent    = red;
  document.getElementById('s-yellow').textContent = yellow;
  document.getElementById('s-green').textContent  = green;
  document.getElementById('data-src').textContent = 'source: ' + src;
}

function toggleLine(btn) {
  const line = btn.dataset.line;
  if (activeLines.has(line)) {
    activeLines.delete(line);
    btn.classList.replace('on','off');
    for (const [id, d] of Object.entries(stopMeta)) {
      if (d.line === line) map.removeLayer(d.marker);
    }
  } else {
    activeLines.add(line);
    btn.classList.replace('off','on');
    for (const [id, d] of Object.entries(stopMeta)) {
      if (d.line === line) d.marker.addTo(map);
    }
  }
}

initMap();
loadData();
setInterval(loadData, 60000);
</script>
</body>
